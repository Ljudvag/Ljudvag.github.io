<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="container">
        <h1>{{ page.heading | default: page.title }}</h1>

        {% if page.marquee %}
        <div class="marquee">
            <marquee>{{ page.marquee }}</marquee>
        </div>
        {% endif %}

        {% comment %} The Five Leagues subsite uses its own menu, not the main one. {% endcomment %}
        {% include fiveleagues-menu.html %}

        {{ content }}

        <div style="text-align: center; margin-top: 20px; font-size: 0.9em; color: #666;">
            &copy; 2026 Ljudvag &mdash; Five Leagues
        </div>
    </div>

    <script src="/assets/js/giscus-loader.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Leagues Campaign - Ljudvag</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
      /* ---- Five Leagues campaign hub: retro-RPG console layout ---- */
      .fl-cabinet{
        max-width:1180px; margin:0 auto; background:#000;
        border:3px solid #fff; box-shadow:5px 5px 0 #333; padding:16px;
      }
      .fl-topbar{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
      .fl-topbar .home{color:#888; text-decoration:none; font-size:0.85em;}
      .fl-topbar .home:hover{color:#fff;}
      .fl-camps span{color:var(--fl-blue,#2fa5f4); margin-right:8px;}
      .fl-camps button{
        background:#f71b9c; color:#000; border:2px solid #f71b9c; cursor:pointer;
        font-family:inherit; font-size:0.7em; padding:5px 9px; margin-right:6px;
      }
      .fl-camps button.tpl{background:#666; border-color:#666;}
      .fl-camps button.active{border-color:#00ff00;}

      .fl-toprow{display:grid; grid-template-columns:280px 1fr 190px; gap:14px;}
      .fl-panel{border:2px solid #fff; background:#000; padding:11px;}
      .fl-panel h3{
        margin:0 0 9px; font-size:0.6em; letter-spacing:2px; text-transform:uppercase;
        color:#00cc00; border-bottom:1px solid #333; padding-bottom:6px;
        display:flex; justify-content:space-between; align-items:baseline;
      }
      .mode-char{color:#00cc00;} .mode-loc{color:#ffd24a;} .mode-dice{color:#2fa5f4;}

      /* LEFT inspector */
      #fl-insName{font-size:1.2em; margin:0 0 2px;}
      .fl-tag{font-size:0.8em; color:#999; font-style:italic; display:block; margin-bottom:9px;}
      .fl-meta{display:grid; grid-template-columns:1fr 1fr; gap:3px 8px; font-size:0.85em; margin-bottom:10px;}
      .fl-meta .lbl{color:#999;}
      .fl-statgrid{display:grid; grid-template-columns:1fr 1fr; gap:5px 10px; font-size:0.9em; margin-bottom:10px;}
      .fl-statgrid > div{border-bottom:1px dotted #333; padding-bottom:2px;}
      .fl-statgrid .k{color:#2fa5f4;} .fl-statgrid .v{color:#fff; float:right;}
      .fl-sub{font-size:0.8em; margin:8px 0 0;}
      .fl-sub .lbl{color:#00cc00; display:block; letter-spacing:1px;}
      .fl-locframe{width:100%; height:430px; border:none; display:block; background:#000;}

      /* CENTER swappable screen */
      /* Height fits the c1 map grid (14*32=448) so the map screen doesn't scroll. */
      .fl-viewport{border:2px dotted #ff00ff; padding:12px; background:#000; height:470px; overflow:auto;}
      .fl-mapgrid{display:grid; justify-content:center; line-height:0; font-size:0;}
      .fl-mapgrid img{width:32px; height:32px; display:block; box-sizing:border-box;}
      .fl-mapgrid a img{cursor:pointer; border:2px solid #ff00ff;}
      .fl-mapgrid a:hover img{filter:brightness(1.6);}
      .fl-screenframe{width:100%; height:100%; border:none; display:block;}

      /* RIGHT actions + resources */
      .fl-cmd a{
        display:block; color:#fff; text-decoration:none; border:1px solid #fff; cursor:pointer;
        padding:7px 8px; margin-bottom:6px; text-align:center; font-size:0.75em;
        text-transform:uppercase; letter-spacing:2px;
      }
      .fl-cmd a:hover{background:#333;}
      .fl-cmd a.active{background:#00cc00; color:#000; border-color:#00cc00;}

      /* last-turn band */
      .fl-logband{margin-top:12px; padding:8px 10px; font-size:0.8em; color:#bfe3ff; background:#04121f; border:2px solid #0099ff;}
      .fl-logband .who{color:#2fa5f4; font-weight:bold;}
      .fl-logband .turnlink{color:#ffd24a; text-decoration:none; font-weight:bold; white-space:nowrap; margin-left:6px;}
      .fl-logband .turnlink:hover{text-decoration:underline;}

      /* roster band */
      .fl-roster{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
      .fl-pc{border:2px solid #444; background:#080808; padding:8px 11px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
      .fl-pc:hover{border-color:#fff;}
      .fl-pc.active{border-color:#f71b9c; box-shadow:0 0 12px rgba(247,27,156,.55);}
      .fl-pc .nm{font-size:0.95em;}
      .fl-pc .ty{font-size:0.6em; color:#999; display:block; text-transform:uppercase; letter-spacing:1px;}
      .fl-pc.av .nm{color:#2fa5f4;} .fl-pc.he .nm{color:#00cc00;} .fl-pc.fo .nm{color:#f71b9c;} .fl-pc.dead .nm{color:#999;}

      @media (max-width:820px){
        .fl-toprow{grid-template-columns:1fr;}
        .fl-roster{grid-template-columns:1fr 1fr;}
        .fl-viewport{height:auto; min-height:470px;}
      }
    </style>
</head>
<body>
    <div class="fl-cabinet">
        <div class="fl-topbar">
            <span class="fl-camps">
                <span>Campaign:</span>
                <button class="campaign-btn" data-campaign="5Leagues-1" onclick="loadCampaign('5Leagues-1')">Wilhelms Hounds</button>
                <button class="campaign-btn" data-campaign="5Leagues-2" onclick="loadCampaign('5Leagues-2')">Example</button>
                <button class="campaign-btn tpl" data-campaign="5Leagues-0" onclick="loadCampaign('5Leagues-0')">Template</button>
            </span>
            <a class="home" href="/">&larr; Ljudvag home</a>
        </div>

        <div class="fl-toprow">
            <!-- LEFT: shared inspector (character or location) -->
            <div class="fl-panel">
                <h3><span id="fl-leftLabel">Inspector</span></h3>
                <div id="fl-insBody"></div>
            </div>

            <!-- CENTER: swappable main screen -->
            <div class="fl-panel">
                <h3 id="fl-centerTitle">The Region</h3>
                <div class="fl-viewport" id="fl-centerView"></div>
            </div>

            <!-- RIGHT: actions + resources -->
            <div class="fl-panel fl-cmd">
                <h3>Actions</h3>
                <a id="fl-a-map"       onclick="setCenter('map')">Map</a>
                <a                     onclick="openMapTab()">Map (new tab)</a>
                <a id="fl-a-overview"  onclick="setCenter('overview')">Overview</a>
                <a id="fl-a-adventure" onclick="setCenter('adventure')">Adventure</a>
                <a id="fl-a-warband"   onclick="setCenter('warband')">Warband</a>
                <a id="fl-a-stash"     onclick="setCenter('stash')">Stash</a>
                <a id="fl-a-dice"      onclick="renderDice()">Dice</a>
                <a id="fl-a-turns"     onclick="setCenter('turns')">Turns</a>
                <div class="fl-logband" id="fl-logband"></div>
            </div>
        </div>

        <!-- warband roster -->
        <div class="fl-panel">
            <h3>Warband</h3>
            <div class="fl-roster" id="fl-roster"></div>
        </div>

        <!-- guestbook (giscus) mounts here -->
        <div id="guestbook-host"></div>

        <div style="text-align:center; margin-top:20px; font-size:0.9em; color:#666;">
            &copy; 2026 Ljudvag &mdash; Five Leagues
        </div>
    </div>

    <script src="posts.js"></script>
    <script src="tooltips.js"></script>
    <script src="shared-utils.js"></script>
    <script>
        let currentCampaign = '5Leagues-1';

        function campNum(){ return currentCampaign.split('-')[1]; }
        function typeClass(t){ return t==='Avatar'?'av' : t==='Hero'?'he' : t==='Follower'?'fo' : 'dead'; }
        function renderList(items){ return items.map(function(i){ return renderItem(i); }).join(', '); }

        // ---- LEFT FRAME: character ----
        function statRow(k,v){ return '<div><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }
        function renderCharacter(i){
            var c = warband[i], s = c.stats;
            var color = c.type==='Avatar'?'#2fa5f4' : c.type==='Hero'?'#00cc00' : c.type==='Follower'?'#f71b9c' : '#999';
            var h = '<div id="fl-insName" style="color:'+color+'">'+c.name+'</div>';
            if(c.notes) h += '<span class="fl-tag">'+c.notes+'</span>';
            h += '<div class="fl-meta">'
               + '<div><span class="lbl">Origin</span> '+renderItem(c.origin.trim())+'</div>'
               + '<div><span class="lbl">Lvl</span> '+c.level+'</div>'
               + '<div><span class="lbl">Backgr.</span> '+c.background+'</div>'
               + '<div><span class="lbl">XP</span> '+c.xp+'</div></div>';
            h += '<div class="fl-statgrid">'
               + statRow('AGI',s.agility)+statRow('SPD',s.speed)+statRow('CMB',s.combat)
               + statRow('TGH',s.tough)+statRow('WIL',s.will)+statRow('LCK',s.luck)+statRow('CST',s.casting)+'</div>';
            if(c.proficiencies && c.proficiencies.length)
                h += '<p class="fl-sub"><span class="lbl">Proficiencies</span>'+renderList(c.proficiencies)+'</p>';
            if(c.spells && c.spells.length)
                h += '<p class="fl-sub"><span class="lbl">Spells</span>'+renderList(c.spells)+'</p>';
            if(c.equipment && c.equipment.length)
                h += '<p class="fl-sub"><span class="lbl">Equipment</span>'+renderList(c.equipment)+'</p>';
            document.getElementById('fl-insBody').innerHTML = h;
            var lbl = document.getElementById('fl-leftLabel');
            lbl.textContent = 'Character'; lbl.className = 'mode-char';
            document.querySelectorAll('.fl-pc').forEach(function(el,idx){ el.classList.toggle('active', idx===i); });
        }

        // ---- LEFT FRAME: location (load existing location page in an iframe) ----
        function renderLocation(page, label){
            // Shrink the location page's text a touch so longer ones fit the narrow left pane.
            document.getElementById('fl-insBody').innerHTML =
                '<iframe class="fl-locframe" src="'+page+'" onload="try{this.contentDocument.body.style.fontSize=\'1.05em\'}catch(e){}"></iframe>';
            var lbl = document.getElementById('fl-leftLabel');
            lbl.textContent = 'Location'; lbl.className = 'mode-loc';
            document.querySelectorAll('.fl-pc').forEach(function(el){ el.classList.remove('active'); });
        }

        // ---- LEFT FRAME: dice roller ----
        function renderDice(){
            document.getElementById('fl-insBody').innerHTML = '<iframe class="fl-locframe" src="dice-roller.html"></iframe>';
            var lbl = document.getElementById('fl-leftLabel');
            lbl.textContent = 'Dice'; lbl.className = 'mode-dice';
            document.querySelectorAll('.fl-pc').forEach(function(el){ el.classList.remove('active'); });
        }

        // ---- CENTER: map (rendered inline from mapData) ----
        function mapHTML(){
            if(typeof mapData === 'undefined' || !mapData){ return '<p class="text-grey">No map for this campaign.</p>'; }
            var html = '<div class="fl-mapgrid" style="grid-template-columns:repeat('+mapData.columns+',32px);">';
            mapData.sections.forEach(function(sec){
                var img = '<img src="'+sec.image+'" alt="'+(sec.alt||'')+'">';
                if(sec.clickable && sec.page){
                    var safe = (sec.alt||'Location').replace(/'/g,"\\'");
                    html += '<a href="javascript:void(0)" onclick="renderLocation(\''+sec.page+'\',\''+safe+'\')">'+img+'</a>';
                } else { html += img; }
            });
            return html + '</div>';
        }
        function screenFrame(src){ return '<iframe class="fl-screenframe" src="'+src+'"></iframe>'; }
        function openMapTab(){ window.open('map.html?c='+campNum(), '_blank'); }

        // ---- CENTER: turns list (current campaign only, from posts.js blogPosts) ----
        function turnsHTML(){
            var turns = (typeof blogPosts !== 'undefined' ? blogPosts : []).filter(function(p){ return p.category === currentCampaign; });
            if(!turns.length) return '<p class="text-grey">No turns recorded yet for this campaign.</p>';
            turns = turns.slice().reverse(); // blogPosts is newest-first; show chronologically
            var html = '<ul style="list-style:none; padding:0; margin:0;">';
            turns.forEach(function(t){
                html += '<li style="margin-bottom:16px; padding-bottom:16px; border-bottom:1px solid #666;">'
                     + '<a href="'+t.url+'" style="color:#0099ff; text-decoration:none; font-weight:bold;">'+t.title+'</a>'
                     + '<div style="color:#999; font-size:0.85em;">'+t.date+'</div>'
                     + (t.excerpt ? '<div style="font-size:0.9em; margin-top:4px;">'+t.excerpt+'</div>' : '')
                     + '</li>';
            });
            return html + '</ul>';
        }

        var CENTER_TITLES = {map:'The Region', overview:'Campaign Overview', adventure:'Adventure', warband:'Warband', stash:'Stash', turns:'Campaign Turns'};
        function setCenter(view){
            var n = campNum(), body;
            if(view==='map')            body = mapHTML();
            else if(view==='overview')  body = screenFrame('overview.html?c='+n);
            else if(view==='adventure') body = screenFrame('adventure.html?c='+n);
            else if(view==='warband')   body = screenFrame('warband.html?c='+n);
            else if(view==='stash')     body = screenFrame('stash.html?c='+n);
            else if(view==='turns')     body = turnsHTML();
            document.getElementById('fl-centerView').innerHTML = body;
            document.getElementById('fl-centerTitle').textContent = CENTER_TITLES[view];
            ['map','overview','adventure','warband','stash','turns'].forEach(function(v){
                document.getElementById('fl-a-'+v).classList.toggle('active', v===view);
            });
        }

        // ---- last-turn band (from posts.js blogPosts) ----
        function renderLastTurn(){
            var band = document.getElementById('fl-logband');
            var turns = (typeof blogPosts !== 'undefined' ? blogPosts : []).filter(function(p){ return p.category === currentCampaign; });
            if(!turns.length){
                band.innerHTML = '<span class="who">Last Turn:</span> No turns recorded yet. '
                    + '<a class="turnlink" href="/five-leagues/turns/">Turns &rarr;</a>';
                return;
            }
            var t = turns[0];
            band.innerHTML = '<span class="who">Last Turn &mdash; '+t.title+':</span> '
                + (t.excerpt || '') + ' <a class="turnlink" href="'+t.url+'">Read full turn &rarr;</a>';
        }

        // ---- roster ----
        function renderRoster(){
            var html = '';
            if(typeof warband === 'undefined' || !warband.length){
                document.getElementById('fl-roster').innerHTML = '<p class="text-grey">No warband members yet.</p>';
                return;
            }
            warband.forEach(function(c,i){
                html += '<div class="fl-pc '+typeClass(c.type)+'" onclick="renderCharacter('+i+')">'
                     + '<div><span class="nm">'+c.name+'</span><span class="ty">'+c.type+'</span></div>'
                     + '</div>';
            });
            document.getElementById('fl-roster').innerHTML = html;
        }

        // ---- data loading + render ----
        function injectScript(src, id, cb){
            var old = document.getElementById(id);
            if(old) old.remove();
            var s = document.createElement('script');
            s.id = id; s.src = src;
            s.onload = cb;
            s.onerror = function(){ console.error('Failed to load '+src); cb(); };
            document.head.appendChild(s);
        }

        function renderAll(){
            renderRoster();
            renderLastTurn();
            setCenter('map');
            if(typeof warband !== 'undefined' && warband.length) renderCharacter(0);
            else document.getElementById('fl-insBody').innerHTML = '<p class="text-grey">No warband members yet.</p>';
        }

        function loadCampaign(campaignId){
            currentCampaign = campaignId;
            var n = campaignId.split('-')[1];
            document.querySelectorAll('.campaign-btn').forEach(function(btn){
                btn.classList.toggle('active', btn.getAttribute('data-campaign') === campaignId);
            });
            // warband data, then map data, then render
            injectScript('c'+n+'/warband-data.js', 'fl-warband-data', function(){
                injectScript('c'+n+'/map-data.js', 'fl-map-data', renderAll);
            });
        }

        loadCampaign(currentCampaign);
    </script>
    <script src="/assets/js/giscus-loader.js"></script>
</body>
</html>

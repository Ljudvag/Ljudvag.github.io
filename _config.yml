# ============================================================
#  Jekyll configuration for ljudvag.github.io
#
#  Jekyll is a "static site generator": when you push to the
#  main branch, GitHub runs Jekyll on this repo and serves the
#  plain HTML it produces. You never run anything yourself.
#
#  This file is the one place global settings live.
# ============================================================

title: Ljudvag
description: A World Wide Web web site

# --- Markdown engine -----------------------------------------
# How .md files (blog posts, campaign turns) get turned into HTML.
# kramdown is the GitHub Pages default; no reason to change it.
markdown: kramdown

# --- URLs for blog posts -------------------------------------
# A file _posts/2026-01-03-first-post.md will be published at
#   /blog/first-post/
# Change the pattern here and every post URL follows.
permalink: /blog/:title/

# --- Five Leagues campaign turns -----------------------------
# Campaign turns live in five-leagues/_posts/ -- a posts folder INSIDE the
# subsite, so Five Leagues keeps its own content together. Jekyll still
# collects them into site.posts (we tell them apart by "category: 5leagues"),
# but this rule gives any post in that folder a /five-leagues/turns/... URL,
# so no Five Leagues content lives under /blog/.
defaults:
  - scope:
      path: "five-leagues/_posts"
      type: posts
    values:
      permalink: /five-leagues/turns/:title/

# --- Things Jekyll should ignore -----------------------------
# archive/ is a frozen copy of the old pre-Jekyll site, kept only
# for reference. We don't want it rebuilt or served as the live site.
exclude:
  - archive/
  - README.md
  - STRUCTURE.md
  - post-template.md
